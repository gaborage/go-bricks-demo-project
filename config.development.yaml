# =============================================================================
# Go-Bricks Demo Project — Development Configuration
# =============================================================================
# Environment: development (loaded when APP_ENV=development)
# Override values from the base config.yaml (framework defaults).
# Environment variables override YAML (e.g., APP_NAME overrides app.name).
# =============================================================================

# --- HTTP Server ------------------------------------------------------------
# All routes — including health and ready — are mounted under this base path.
# The framework default for server.path.base is empty (routes at root), so the
# documented demo URLs (curl http://localhost:8080/api/v1/products) and the
# k6 load tests only resolve once this is set to /api/v1.
#
# health/ready resolve at /api/v1/health and /api/v1/ready respectively.
server:
  path:
    base: "/api/v1"
    health: "/health"
    ready: "/ready"
  # go-bricks v0.41.0 (#559, ADR-026) flipped the gzip threshold default from 0
  # (compress everything) to 1024 bytes, so responses < 1KB now ship uncompressed.
  # Pinned to 0 here to hold wire behavior constant vs v0.39.1 for the perf A/B —
  # otherwise small product/error JSON silently switches to plaintext and
  # confounds response-size/bandwidth comparisons. Set to 1024 (or delete this
  # block) to adopt the current framework default.
  gzip:
    minlength: 0

# --- Messaging (RabbitMQ) ---------------------------------------------------
# AMQP broker URL. Required for the outbox relay to publish events; without it
# the relay job logs "messaging not available" every poll_interval (5s).
# docker-compose runs RabbitMQ on localhost:5672. The URL omits user info on
# purpose — the Go amqp091 client fills guest/guest by default, and the broker
# is configured (etc/docker/rabbitmq/rabbitmq.conf) to accept guest from any
# source so credentials don't need to live in config files.
messaging:
  broker:
    url: "amqp://localhost:5672/"

# --- Rate limiting ----------------------------------------------------------
# Framework defaults are app.rate.limit=100 / burst=200 per IP. The bundled k6
# load tests (50+ VUs) blow through that limit and surface as 5-10% HTTP 429s,
# which makes them measure the limiter, not the pipeline they're supposed to
# benchmark. Raised here so dev/benchmark runs are unbottlenecked. Production
# typically tunes these per-tenant or relies on a CDN/WAF for IP throttling.
app:
  rate:
    limit: 2000
    burst: 4000

# --- Logging ----------------------------------------------------------------
# go-bricks v0.39.0 (go-bricks#424) changed the default log output format from
# "json" to "auto": console (colored) only when stdout is a TTY AND OTLP log
# export is inactive — otherwise JSON. Pinned explicitly so `make run` keeps
# readable console output locally while still emitting JSON for the Loki/OTLP
# pipeline. NOTE: "console" combined with OTLP log export panics at startup;
# "auto" resolves that automatically.
log:
  output:
    format: auto   # auto | console | json

# --- Default Database -------------------------------------------------------
# Accessed by modules via deps.DB(ctx).
database:
  type: postgresql
  host: localhost
  port: 5432
  database: postgres
  username: postgres
  password: postgres

  # Session timezone (go-bricks v0.29.0+) — IANA name applied to EVERY new
  # physical connection. PostgreSQL receives it via the pgx StartupMessage's
  # RuntimeParams, so pool members spawned later (after drops, lifetime expiry,
  # or burst load) inherit the same setting — no one-shot drift.
  #
  # Behavior:
  #   "UTC"               (default if unset)        opinionated, environment-stable
  #   "America/New_York"  (any IANA name)           validated via time.LoadLocation
  #   "-"                 (sentinel)                opt out: inherit DB server default
  #   "+05:30"            (numeric offset)          REJECTED — use Etc/GMT-5 instead
  #
  # See: https://github.com/gaborage/go-bricks/blob/main/wiki/adr_016_database_session_timezone.md
  timezone: UTC
  # timezone: "-"   # legacy opt-out: inherit DB server default timezone (keep the quotes in YAML)

# --- Named Databases --------------------------------------------------------
# Accessed via deps.DBByName(ctx, "<name>"). The analytics module uses "analytics".
databases:
  analytics:
    type: postgresql
    host: localhost
    port: 5433              # docker-compose maps the analytics Postgres here
    database: analytics
    username: postgres
    password: postgres

    # Each named database gets its own timezone setting. Here we deliberately
    # pick a non-UTC zone to prove the per-connection enforcement: queries
    # against analytics report Tokyo time even when the default DB reports UTC.
    timezone: Asia/Tokyo
    # timezone: "-"   # legacy opt-out for the analytics named DB

# --- Transactional Outbox ---------------------------------------------------
# Reliable event publishing via the dual-write pattern.
# Events are written to an outbox table inside the same DB transaction as
# business data, then relayed to RabbitMQ by a background poller.
# NOTE (go-bricks v0.40.1, #549): config keys bind by their flat-smushed koanf
# tag (tablename, autocreatetable, …), NOT the underscored form. The pre-0.40.1
# underscored keys (table_name, auto_create_table, …) silently STOP binding on
# upgrade and fall back to their zero-value defaults with no error — which for
# this block means autocreatetable=false (table never created) and
# defaultexchange="" (events never route). Keep these flat-smushed.
outbox:
  enabled: true
  tablename: gobricks_outbox
  autocreatetable: true            # Auto-creates the outbox table on first use
  defaultexchange: product-events  # Target exchange when event.Exchange is empty
  pollinterval: 5s                 # How often the relay checks for unsent events
  batchsize: 100                   # Max events per relay cycle
  # go-bricks v0.45.0 (#626) reworked retry semantics: maxretries now dead-letters
  # only POISON events (undecodable headers) to status='failed'. Connectivity
  # failures (broker down, NACK, publish-confirm timeout, missing exchange) advance
  # retry_count and retry INDEFINITELY — they never park. Monitor retry_count and
  # prune status='failed' rows manually (DeletePublished purges only 'published').
  maxretries: 5                    # Poison-event dead-letter threshold (NOT connectivity retries)
  retentionperiod: 72h             # How long delivered events are kept
  # publishtimeout bounds a single relay publish attempt (v0.45.0, default 60s).
  # HARD INVARIANT: publishtimeout MUST be >= messaging.reconnect.connectiontimeout
  # (default 30s) or the outbox module fails to Init. Raise this if you raise the
  # reconnect connection timeout.
  publishtimeout: 60s

# --- Scheduler --------------------------------------------------------------
# The scheduler drives the outbox relay job above. go-bricks v0.39.0
# (go-bricks#527) added scheduler.timezone — the IANA name used to interpret
# scheduled-job times. Unset now defaults to UTC; pinned explicitly to mirror
# database.timezone and document intent. Sentinel "-" opts out (host-local).
scheduler:
  timezone: UTC

# --- KeyStore ----------------------------------------------------------------
# Named RSA key pairs for signing/verification.
# Each key supports public/private sources independently. Two source styles:
#   - file:  path to a DER-encoded key (PKIX for public, PKCS8 or PKCS1 for private).
#   - value: raw base64-encoded DER. Production deployments typically inject the
#            base64 string from a secret manager via env var; the demo inlines it
#            so the framework's `value:` source is exercised end-to-end.
# `make generate-keys` regenerates all DER files AND patches the inline
# `tokens-peer` public-key base64 between the BEGIN/END markers below.
keystore:
  keys:
    # Webhook signing — both halves loaded from DER files.
    webhook-signing:
      public:
        file: "certs/webhook_signing_public.der"
      private:
        file: "certs/webhook_signing_private.der"

    # tokens-our: our app's keypair for the JOSE-protected /tokens flow.
    # Both halves on disk — production pattern when keys are mounted via Kubernetes
    # secrets or external secret-manager projection (e.g., AWS Secrets Manager CSI).
    tokens-our:
      public:
        file: "certs/tokens_our_public.der"
      private:
        file: "certs/tokens_our_private.der"

    # tokens-peer: the simulated counterparty keypair (in production this would
    # be Visa Token Services or similar). Public is sourced via inline base64 to
    # exercise the `value:` source style; private stays on disk so the in-process
    # simulator can decrypt+sign as the peer would.
    tokens-peer:
      public:
        # BEGIN_TOKENS_PEER_PUB — managed by `make generate-keys`, do not edit by hand.
        value: ""
        # END_TOKENS_PEER_PUB
      private:
        file: "certs/tokens_peer_private.der"

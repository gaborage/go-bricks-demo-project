# =============================================================================
# Go-Bricks Demo Project — Development Configuration
# =============================================================================
# Environment: development (loaded when APP_ENV=development)
# Override values from the base config.yaml (framework defaults).
# Environment variables override YAML (e.g., APP_NAME overrides app.name).
# =============================================================================

# --- Default Database -------------------------------------------------------
# Accessed by modules via deps.DB(ctx).
database:
  type: postgresql
  host: localhost
  port: 5432
  database: postgres
  username: postgres
  password: postgres

  # Session timezone (go-bricks v0.29.0+) — IANA name applied to EVERY new
  # physical connection. PostgreSQL receives it via the pgx StartupMessage's
  # RuntimeParams, so pool members spawned later (after drops, lifetime expiry,
  # or burst load) inherit the same setting — no one-shot drift.
  #
  # Behavior:
  #   "UTC"               (default if unset)        opinionated, environment-stable
  #   "America/New_York"  (any IANA name)           validated via time.LoadLocation
  #   "-"                 (sentinel)                opt out: inherit DB server default
  #   "+05:30"            (numeric offset)          REJECTED — use Etc/GMT-5 instead
  #
  # See: https://github.com/gaborage/go-bricks/blob/main/wiki/adr-016-database-session-timezone.md
  timezone: UTC

# --- Named Databases --------------------------------------------------------
# Accessed via deps.DBByName(ctx, "<name>"). The analytics module uses "analytics".
databases:
  analytics:
    type: postgresql
    host: localhost
    port: 5433              # docker-compose maps the analytics Postgres here
    database: analytics
    username: postgres
    password: postgres

    # Each named database gets its own timezone setting. Here we deliberately
    # pick a non-UTC zone to prove the per-connection enforcement: queries
    # against analytics report Tokyo time even when the default DB reports UTC.
    timezone: Asia/Tokyo

# --- Transactional Outbox ---------------------------------------------------
# Reliable event publishing via the dual-write pattern.
# Events are written to an outbox table inside the same DB transaction as
# business data, then relayed to RabbitMQ by a background poller.
outbox:
  enabled: true
  table_name: gobricks_outbox
  auto_create_table: true          # Auto-creates the outbox table on first use
  default_exchange: product-events # Target exchange when event.Exchange is empty
  poll_interval: 5s                # How often the relay checks for unsent events
  batch_size: 100                  # Max events per relay cycle
  max_retries: 5                   # Retry limit before marking an event as failed
  retention_period: 72h            # How long delivered events are kept

# --- KeyStore ----------------------------------------------------------------
# Named RSA key pairs for signing/verification.
# Keys are loaded at startup from DER files generated by `make generate-keys`.
keystore:
  keys:
    webhook-signing:
      public:
        file: "certs/webhook_signing_public.der"
      private:
        file: "certs/webhook_signing_private.der"

# Allow the built-in `guest` user to authenticate from non-loopback sources.
# RabbitMQ's default policy restricts `guest` to localhost only, which would
# reject clients on the docker network and clients on the host connecting
# through the published port (Docker NAT presents a non-loopback source IP).
#
# Disabling the restriction here lets the demo connect with a credential-less
# AMQP URL (amqp://host:5672/). The Go amqp091 client fills `guest`/`guest`
# on the wire by default when the URL omits user info, so the broker still
# performs PLAIN auth — we just keep credentials out of config files.
loopback_users = none

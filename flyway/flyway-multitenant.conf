# Flyway configuration for the schema-per-tenant migration demo.
#
# Unlike flyway-postgresql.conf (which hardcodes flyway.schemas=public), this
# config deliberately omits flyway.schemas. When unset, Flyway resolves the
# default schema via the JDBC session's current_schema(), which honors the
# role's search_path. Per-tenant roles are configured with
# ALTER ROLE <tenant> SET search_path TO <schema> in
# etc/docker/postgres/multitenant-init.sql, so each tenant's
# flyway_schema_history lands inside its own schema.
#
# go-bricks-migrate populates DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD from
# each multitenant.tenants.<id>.database block; that is the only routing data
# that reaches the Flyway subprocess.

# Database connection
flyway.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
flyway.user=${DB_USER}
flyway.password=${DB_PASSWORD}

# Migration settings
flyway.table=flyway_schema_history
flyway.baselineOnMigrate=true
flyway.validateMigrationNaming=true
flyway.outOfOrder=false

# Placeholder replacement
flyway.placeholderReplacement=true
flyway.placeholders.appName=go-bricks-demo-multitenant

# Encoding
flyway.encoding=UTF-8

# Validate every migrate run; surfaces checksum drift before applying further work
flyway.validateOnMigrate=true

# Logging
flyway.loggers=console
